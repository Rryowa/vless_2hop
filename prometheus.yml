global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# NOTE: <EU_IP> is a placeholder — setup-monitoring.sh substitutes it with sed before deploying.

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: tcp_probes
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - 127.0.0.1:443
          - 127.0.0.1:48022
          - <EU_IP>:443
          - <EU_IP>:8443
          - <EU_IP>:9443
          - <EU_IP>:48022
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ['127.0.0.1:9091']

  - job_name: node_ru
    static_configs:
      - targets: ['127.0.0.1:9100']

  - job_name: node_eu
    static_configs:
      - targets: ['<EU_IP>:9100']
