global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# NOTE: <EU_IP> is a placeholder — setup-monitoring.sh substitutes it with sed before deploying.

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

rule_files:
  - /etc/prometheus/prometheus-alerts.yml

scrape_configs:
  - job_name: tcp_probes
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets: ['127.0.0.1:443']
        labels:
          node: 'RU'
          name: '<LOCAL_SNI>'
      - targets: ['127.0.0.1:48022']
        labels:
          node: 'RU'
          name: 'RU SSH'
      - targets: ['<EU_IP>:443']
        labels:
          node: 'EU'
          name: '<SNI_1>'
      - targets: ['<EU_IP>:8443']
        labels:
          node: 'EU'
          name: '<SNI_2>'
      - targets: ['<EU_IP>:9443']
        labels:
          node: 'EU'
          name: '<SNI_3>'
      - targets: ['<EU_IP>:48022']
        labels:
          node: 'EU'
          name: 'EU SSH'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115

  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ['127.0.0.1:9091']

  - job_name: node_ru
    static_configs:
      - targets: ['127.0.0.1:9100']
        labels:
          node: 'RU'

  - job_name: node_eu
    static_configs:
      - targets: ['<EU_IP>:9100']
        labels:
          node: 'EU'

  - job_name: cert_probes
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://<KUMA_DOMAIN>:3000
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115
