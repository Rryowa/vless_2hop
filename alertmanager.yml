global:
  resolve_timeout: 5m

route:
  receiver: bark
  group_by: ['alertname', 'sni', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: bark
    webhook_configs:
      - url: 'http://127.0.0.1:9095/bark'
        send_resolved: true

inhibit_rules:
  - source_match:
      alertname: NodeDown
    target_match:
      alertname: XrayPortDown
    equal: ['instance']
