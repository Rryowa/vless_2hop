groups:
  - name: vpn_alerts
    rules:
      - alert: DPIBlockDetected
        expr: tls_probe_success{mode="baseline"} == 1 and on(sni) tls_probe_success{mode="dpi"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DPI block on {{ $labels.sni }}"
          description: "EU baseline UP but RU DPI probe DOWN for {{ $labels.sni }} — active DPI block detected"

      - alert: XrayPortDown
        expr: probe_success{job="tcp_probes"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Port down: {{ $labels.instance }}"
          description: "TCP probe failed for {{ $labels.instance }}"

      - alert: VPSDiskLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk on {{ $labels.instance }}"
          description: "Disk below 10% on {{ $labels.instance }}: {{ $value | humanizePercentage }} free"

      - alert: NodeDown
        expr: up{job=~"node_.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node Exporter down: {{ $labels.instance }}"

      - alert: TLSPushMissing
        expr: absent(tls_probe_success{mode="dpi"})
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DPI TLS push metrics missing from Pushgateway"
          description: "No tls_probe_success{mode=dpi} metrics in Pushgateway — tls-push-monitor may be down on RU node"
