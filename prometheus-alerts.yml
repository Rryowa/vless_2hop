groups:
  - name: vpn_alerts
    rules:
      - alert: DPIBlockDetected
        expr: tls_probe_success{mode="baseline"} == 1 and on(sni) tls_probe_success{mode="dpi"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DPI block on {{ $labels.sni }}"
          description: "EU baseline UP but RU DPI probe DOWN for {{ $labels.sni }} — active DPI block detected"

      - alert: DPIThrottling
        expr: (tls_probe_latency_ms{mode="dpi"} > 0) / on(sni) (tls_probe_latency_ms{mode="baseline"} > 0) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DPI throttling suspected on {{ $labels.sni }}"
          description: "DPI probe latency is {{ $value | printf \"%.1f\" }}x baseline for {{ $labels.sni }} — possible shaping detected"

      - alert: HighPacketLoss
        expr: 1 - avg_over_time(probe_success{job="icmp_probes"}[5m]) > 0.10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High packet loss: {{ $labels.instance }}"
          description: "ICMP packet loss to {{ $labels.instance }} is above 10% (current: {{ $value | humanizePercentage }})"

      - alert: HighTCPRetransmissions
        expr: rate(node_netstat_Tcp_RetransSegs[5m]) / (rate(node_netstat_Tcp_OutSegs[5m]) > 0) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High TCP retransmissions on {{ $labels.instance }}"
          description: "TCP retransmission rate is {{ $value | humanizePercentage }} on {{ $labels.instance }} — likely path interference or congestion"

      - alert: XrayPortDown
        expr: probe_success{job="tcp_probes"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Port down: {{ $labels.instance }}"
          description: "TCP probe failed for {{ $labels.instance }}"

      - alert: VPSDiskLow
        expr: node_filesystem_avail_bytes{mountpoint="/",fstype!~"rootfs|tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"rootfs|tmpfs|overlay"} < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk on {{ $labels.instance }}"
          description: "Disk below 10% on {{ $labels.instance }}: {{ $value | humanizePercentage }} free"

      - alert: NodeDown
        expr: up{job=~"node_.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node Exporter down: {{ $labels.instance }}"

      - alert: TLSPushStale
        expr: time() - push_time_seconds{job="tls_probes", mode="dpi"} > 120
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "DPI TLS push metrics stale on {{ $labels.instance }}"
          description: "Pushgateway metrics for job=tls_probes are older than 120s. tls-push-monitor may be crashed or blocked."

      - alert: CertExpirySoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 3600 / 24 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expiring soon for {{ $labels.instance }}"
          description: "SSL certificate for {{ $labels.instance }} expires in less than 15 days."
